services:
  postgres:
    image: postgres:15
    container_name: volumeturtle-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: volume_turtle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d volume_turtle"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - volume_turtle_db:/var/lib/postgresql/data

volumes:
  volume_turtle_db:
